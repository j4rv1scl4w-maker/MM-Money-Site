name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Remove server-only code before static export
      # These files stay in the repo for local Studio use
      - name: Strip server-only routes
        run: |
          rm -rf src/app/api
          rm -rf src/app/studio
          rm -rf src/app/studio-login
          rm -f src/lib/auth.ts
          rm -f src/components/LogoutButton.tsx

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BUILD_MODE: export

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
